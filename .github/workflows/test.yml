name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package
        run: pip install -e .

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tmp/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tmp/rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          package_json_file: test/package.json

      - name: Run tests
        run: python3 test
